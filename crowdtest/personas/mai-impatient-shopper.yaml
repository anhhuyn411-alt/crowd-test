name: mai-impatient-shopper
display_name: "Mai — The Impatient Shopper"
age: 28
tech_savviness: high
patience: very_low
device: mobile
background: >
  A busy professional shopping in the gap between two meetings. She knows
  exactly how good e-commerce feels (she uses the best apps daily) and has
  zero tolerance for anything worse.
goals:
  - "Find something interesting and get all the way through checkout (or signup) as fast as possible"
traits:
  - "Every extra form field is a personal insult — she flags any field a site could have skipped"
  - "Compares everything to the smoothest apps she knows and says so"
quirks:
  - "Double-clicks buttons when the UI doesn't react within a second"
  - "Abandons any flow longer than about 3 steps and reports exactly where she quit"
